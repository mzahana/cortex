# Redis config for the LMS `redis` service — cache + sessions + Celery broker
# (docs/architecture.md §1, docs/deployment.md §1/§6).
#
# Capped so cache/broker traffic never crowds the 6 GB NAS budget:
maxmemory 256mb
maxmemory-policy allkeys-lru

# Internal-network only (compose bridge network, never published to the host
# or the tunnel) — safe to disable protected mode / bind broadly inside the
# container network.
bind 0.0.0.0
protected-mode no

# Light persistence: AOF (not RDB snapshotting) so sessions/broker queue
# survive a container restart without the fork/CPU spike of periodic RDB
# saves on the NAS's dual-core CPU. `everysec` bounds data loss to ~1s.
appendonly yes
appendfsync everysec
save ""

# Keep logs quiet; container logs already captured by docker.
loglevel notice
