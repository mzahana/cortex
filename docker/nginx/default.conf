# Server block. Proxy targets, mount points, and security headers are the
# real, final shape. /usr/share/nginx/html is now bind-mounted from the real
# `frontend/dist` (T0.7) via docker-compose.yml.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # --- Security headers (docs/deployment.md §7) ---------------------------
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(self), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'" always;
    # TLS itself terminates at the Cloudflare edge (Full strict, see
    # deployment.md §3); HSTS is set there too, and duplicated here as
    # defense-in-depth for any direct-to-nginx access path.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 20m;

    # Unauthenticated liveness check for the docker healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /usr/share/nginx/media/;
        expires 7d;
        access_log off;
    }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin is deliberately out of the SPA's `/admin/*` namespace
    # (product-admin screens like /admin/categories, /admin/locations live in
    # the React app). Reachable at /django-admin/ if ever needed.
    location /django-admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Built PWA (`frontend/dist`, bind-mounted in docker-compose.yml).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
